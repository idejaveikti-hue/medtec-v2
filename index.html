<!doctype html>
<html lang="lt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MedTec V2 – Paramedic Mode</title>

<style>
:root{
  --bg:#020B13;
  --bg2:#061827;
  --card:#0B2233;
  --card2:#0F2A3F;
  --line:rgba(255,255,255,.10);
  --text:#F8FAFC;
  --muted:#9FB0C2;
  --red:#EF2B2D;
  --red2:#B91519;
  --orange:#F59E0B;
  --blue:#2F80ED;
  --green:#22C55E;
  --cyan:#14B8A6;
  --nav:#03101C;
  --shadow:0 18px 45px rgba(0,0,0,.45);
}

*{box-sizing:border-box}

html,body{
  margin:0;
  min-height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:radial-gradient(circle at top,#0B2A44 0,#020B13 42%,#01060B 100%);
  color:var(--text);
}

button,input{
  font:inherit;
}

.app{
  max-width:520px;
  margin:0 auto;
  min-height:100vh;
  padding:env(safe-area-inset-top) 14px 96px;
}

.page{
  display:none;
}

.page.active{
  display:block;
}

.top{
  padding:18px 0 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.star{
  width:44px;
  height:44px;
  border-radius:14px;
  background:linear-gradient(135deg,#075EC9,#0B2A44);
  display:grid;
  place-items:center;
  box-shadow:0 10px 25px rgba(47,128,237,.25);
}

.brand h1{
  margin:0;
  font-size:21px;
  letter-spacing:.1px;
}

.brand p{
  margin:2px 0 0;
  color:#FF3B3B;
  font-size:11px;
  font-weight:900;
  letter-spacing:.8px;
}

.iconBtn{
  width:38px;
  height:38px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  border-radius:14px;
  color:white;
  display:grid;
  place-items:center;
}

.search{
  position:relative;
  margin:10px 0 18px;
}

.search input{
  width:100%;
  background:rgba(255,255,255,.07);
  border:1px solid var(--line);
  border-radius:14px;
  color:white;
  padding:14px 44px 14px 42px;
  outline:none;
}

.search input::placeholder{
  color:#8FA2B6;
}

.search .sicon{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  color:#9FB0C2;
}

.sectionTitle{
  font-size:12px;
  color:#FF3B3B;
  text-transform:uppercase;
  letter-spacing:.8px;
  font-weight:900;
  margin:18px 0 10px;
}

.quickGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.quick{
  min-height:108px;
  border:1px solid var(--line);
  background:linear-gradient(145deg,rgba(255,255,255,.06),rgba(255,255,255,.025));
  border-radius:16px;
  padding:16px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:0 10px 25px rgba(0,0,0,.22);
  cursor:pointer;
}

.quick.active{
  border-color:rgba(239,43,45,.9);
  box-shadow:0 0 0 1px rgba(239,43,45,.25),0 18px 35px rgba(239,43,45,.12);
}

.lineIcon{
  width:34px;
  height:34px;
  color:currentColor;
}

.quick h3{
  font-size:16px;
  margin:8px 0 2px;
}

.quick p{
  margin:0;
  color:var(--muted);
  font-size:12px;
}

.redC{color:#FF3B3B}
.whiteC{color:#F8FAFC}
.cyanC{color:#67E8F9}
.greenC{color:#86EFAC}
.orangeC{color:#FBBF24}
.blueC{color:#93C5FD}

.wideAction{
  margin:14px 0 0;
  background:rgba(255,255,255,.07);
  border:1px solid var(--line);
  border-radius:15px;
  padding:15px;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:850;
  width:100%;
}

.list{
  display:flex;
  flex-direction:column;
  gap:9px;
}

.row{
  background:rgba(255,255,255,.055);
  border:1px solid var(--line);
  border-radius:14px;
  padding:13px;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
}

.rowIcon{
  width:38px;
  height:38px;
  border-radius:13px;
  background:rgba(255,255,255,.06);
  display:grid;
  place-items:center;
  flex:0 0 auto;
}

.rowMain{
  flex:1;
}

.row h3{
  font-size:15px;
  margin:0 0 3px;
}

.row p{
  font-size:12px;
  margin:0;
  color:var(--muted);
}

.badge{
  font-size:10px;
  text-transform:uppercase;
  border-radius:8px;
  padding:5px 8px;
  font-weight:900;
  white-space:nowrap;
}

.crit{
  background:rgba(239,43,45,.18);
  color:#FF7777;
}

.urgent{
  background:rgba(245,158,11,.18);
  color:#FBBF24;
}

.headDetail{
  margin:0 -14px 14px;
  padding:18px 14px 16px;
  background:linear-gradient(135deg,rgba(239,43,45,.78),rgba(79,17,26,.38));
  border-bottom:1px solid rgba(239,43,45,.35);
}

.detailTop{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
}

.back{
  background:transparent;
  border:0;
  color:white;
  font-size:28px;
  line-height:1;
}

.headCard{
  border:1px solid rgba(239,43,45,.65);
  background:rgba(5,15,25,.35);
  border-radius:16px;
  padding:16px;
  display:flex;
  gap:15px;
  align-items:center;
}

.headCard h2{
  margin:0;
  font-size:21px;
}

.headCard p{
  margin:5px 0 0;
  color:#FFD4D4;
}

.tabs{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:4px 0 12px;
}

.tab{
  border:0;
  border-radius:999px;
  padding:9px 12px;
  background:rgba(255,255,255,.08);
  color:#CBD5E1;
  font-size:12px;
  font-weight:850;
  white-space:nowrap;
}

.tab.active{
  background:#EF2B2D;
  color:white;
}

.panel{
  background:rgba(255,255,255,.055);
  border:1px solid var(--line);
  border-radius:16px;
  padding:15px;
  margin:10px 0;
}

.panel h3{
  margin:0 0 12px;
  font-size:14px;
  color:#fff;
  text-transform:uppercase;
  letter-spacing:.4px;
}

.step{
  display:flex;
  gap:10px;
  align-items:flex-start;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.07);
  border-radius:12px;
  padding:11px;
  margin:8px 0;
}

.num{
  width:24px;
  height:24px;
  border-radius:50%;
  background:#EF2B2D;
  color:white;
  font-weight:900;
  font-size:12px;
  display:grid;
  place-items:center;
  flex:0 0 auto;
}

.step p{
  margin:2px 0 0;
  line-height:1.35;
  font-size:14px;
}

.redPanel{
  border-color:rgba(239,43,45,.55);
  box-shadow:inset 0 0 0 1px rgba(239,43,45,.08);
}

.redPanel li{
  margin:7px 0;
  color:#FFD1D1;
}

.infoText{
  color:#DBEAFE;
  line-height:1.5;
  font-size:14px;
}

.abcdeItem{
  display:flex;
  align-items:center;
  gap:14px;
}

.letter{
  width:54px;
  height:54px;
  border-radius:14px;
  color:white;
  font-size:28px;
  font-weight:950;
  display:grid;
  place-items:center;
  flex:0 0 auto;
}

.drugFilters{
  display:flex;
  gap:8px;
  overflow:auto;
  margin:10px 0 14px;
}

.chip{
  border:1px solid var(--line);
  background:rgba(255,255,255,.06);
  color:#DBEAFE;
  border-radius:999px;
  padding:9px 12px;
  font-size:12px;
}

.chip.active{
  background:#EF2B2D;
  border-color:#EF2B2D;
}

.nav{
  position:fixed;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  width:min(520px,100%);
  background:rgba(3,16,28,.92);
  backdrop-filter:blur(16px);
  border-top:1px solid var(--line);
  display:grid;
  grid-template-columns:repeat(5,1fr);
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));
  z-index:10;
}

.nav button{
  background:transparent;
  border:0;
  color:#8FA2B6;
  font-size:10px;
  font-weight:750;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
}

.nav button.active{
  color:#EF2B2D;
}

.nav svg{
  width:22px;
  height:22px;
}

.tiny{
  font-size:12px;
  color:var(--muted);
  line-height:1.4;
}

@media(min-width:760px){
  body{
    display:grid;
    place-items:center;
  }

  .app{
    min-height:900px;
    width:430px;
    border:1px solid rgba(255,255,255,.12);
    border-radius:34px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.55);
  }
}
</style>
</head>

<body>

<div class="app">

<section id="home" class="page active">
  <div class="top">
    <button class="iconBtn" aria-label="Meniu">☰</button>

    <div class="brand">
      <div class="star" id="starLogo"></div>
      <div>
        <h1>MedTec V2</h1>
        <p>PARAMEDIC MODE</p>
      </div>
    </div>

    <button class="iconBtn" aria-label="Pranešimai">♡</button>
  </div>

  <div class="search">
    <span class="sicon">⌕</span>
    <input id="q" placeholder="Ieškoti būklės ar simptomo..." oninput="renderHome()">
  </div>

  <div class="sectionTitle">Kritinės būklės</div>
  <div id="quickGrid" class="quickGrid"></div>

  <button class="wideAction" onclick="show('protocols')">
    KITI ALGORITMAI <span>›</span>
  </button>
</section>

<section id="detail" class="page">
  <div id="detailBox"></div>
</section>

<section id="abcde" class="page">
  <div class="top">
    <button class="back" onclick="show('home')">‹</button>
    <h2>ABCDE</h2>
    <button class="back">☆</button>
  </div>

  <div class="sectionTitle">Pirminis įvertinimas</div>
  <div id="abcdeList"></div>

  <div class="panel" style="border-color:rgba(47,128,237,.45);background:rgba(47,128,237,.08)">
    <p class="infoText">Nuolatinis būklės vertinimas ir gydymas. Grįžkite prie ABCDE ciklo reguliariai.</p>
  </div>
</section>

<section id="drugs" class="page">
  <div class="top">
    <button class="back" onclick="show('home')">‹</button>
    <h2>Vaistai</h2>
    <button class="back">☆</button>
  </div>

  <div class="drugFilters">
    <button class="chip active">Visi</button>
    <button class="chip">Skubūs</button>
    <button class="chip">Infuzijos</button>
    <button class="chip">Analgetikai</button>
  </div>

  <div id="drugList" class="list"></div>
</section>

<section id="protocols" class="page">
  <div class="top">
    <button class="back" onclick="show('home')">‹</button>
    <h2>Protokolai</h2>
    <button class="back">☆</button>
  </div>

  <div class="search">
    <span class="sicon">⌕</span>
    <input placeholder="Ieškoti protokolo...">
  </div>

  <div class="sectionTitle">Populiariausi</div>
  <div id="protoList" class="list"></div>

  <div class="sectionTitle">Kiti protokolai</div>
  <div class="list">
    <div class="row">
      <div class="rowIcon cyanC" data-icon="abdomen"></div>
      <div class="rowMain"><h3>Pilvo skausmas</h3></div>
      <span>›</span>
    </div>

    <div class="row">
      <div class="rowIcon orangeC" data-icon="temp"></div>
      <div class="rowMain"><h3>Hipertermija</h3></div>
      <span>›</span>
    </div>

    <div class="row">
      <div class="rowIcon blueC" data-icon="cold"></div>
      <div class="rowMain"><h3>Hipotermija</h3></div>
      <span>›</span>
    </div>
  </div>
</section>

</div>

<nav class="nav">
  <button class="active" onclick="show('home',this)">
    <span data-icon="home"></span>
    Pagrindinis
  </button>

  <button onclick="show('abcde',this)">
    <span data-icon="abc"></span>
    ABCDE
  </button>

  <button onclick="show('drugs',this)">
    <span data-icon="bag"></span>
    Vaistai
  </button>

  <button onclick="show('protocols',this)">
    <span data-icon="protocol"></span>
    Protokolai
  </button>

  <button>
    <span data-icon="more"></span>
    Daugiau
  </button>
</nav>

function show(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(btn){
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }

  window.scrollTo(0,0);
}

function renderHome(){
  const q = (document.getElementById("q")?.value || "").toLowerCase();
  const quick = document.getElementById("quickGrid");
  quick.innerHTML = "";

  data
    .filter(x=>(x.t+" "+x.k).toLowerCase().includes(q))
    .slice(0,6)
    .forEach((x,i)=>{
      quick.innerHTML += `
        <div class="quick ${i===0 ? "active" : ""}" onclick="openD(${data.indexOf(x)})">
          <div class="${x.c}">${svg(x.icon)}</div>
          <div>
            <h3>${x.t}</h3>
            <p>${x.cat}</p>
          </div>
        </div>
      `;
    });
}

function steps(arr){
  return arr.map((x,i)=>`
    <div class="step">
      <span class="num">${i+1}</span>
      <p>${x}</p>
    </div>
  `).join("");
}

function openD(i){
  const x = data[i];

  document.getElementById("detailBox").innerHTML = `
    <div class="headDetail">
      <div class="detailTop">
        <button class="back" onclick="show('home')">‹</button>
        <h2>${x.t}</h2>
        <button class="back">☆</button>
      </div>

      <div class="headCard">
        <div class="${x.c}">${svg(x.icon)}</div>
        <div style="flex:1">
          <h2>${x.t}</h2>
          <p>${x.cat}</p>
        </div>
        <span class="badge crit">${x.d}</span>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active">Pirmos minutės</button>
      <button class="tab">ABCDE</button>
      <button class="tab">Atpažinimas</button>
      <button class="tab">Gydymas</button>
    </div>

    <div class="panel">
      <h3>Pirmos minutės</h3>
      ${steps(x.fast)}
    </div>

    <div class="panel redPanel">
      <h3 style="color:#FF3B3B">Raudonos vėliavos</h3>
      <ul>${x.red.map(r=>`<li>${r}</li>`).join("")}</ul>
    </div>

    <div class="panel">
      <h3>Atpažinimas</h3>
      <p class="infoText">${x.sym.join("<br>")}</p>
    </div>

    <div class="panel">
      <h3>Gydymo principai</h3>
      ${steps(x.treat)}
    </div>
  `;
  ${x.meds && x.meds.length ? `
  <div class="panel redPanel">
    <h3 style="color:#FF3B3B">Vaistai ir dozės</h3>
    ${steps(x.meds)}
  </div>
` : ""}

${x.dilution && x.dilution.length ? `
  <div class="panel">
    <h3>Skiedimai / infuzijos</h3>
    ${steps(x.dilution)}
  </div>
` : ""}

${x.children && x.children.length ? `
  <div class="panel" style="border-color:rgba(34,197,94,.45);background:rgba(34,197,94,.08)">
    <h3 style="color:#86EFAC">Vaikai</h3>
    ${steps(x.children)}
  </div>
` : ""}

  show("detail");
}

function renderAbcde(){
  document.getElementById("abcdeList").innerHTML = abcde.map(a=>`
    <div class="row abcdeItem">
      <div class="letter" style="background:${a[4]}">${a[0]}</div>
      <div class="rowMain">
        <h3>${a[1]} – ${a[2]}</h3>
        <p>${a[3]}</p>
      </div>
      <span>›</span>
    </div>
  `).join("");
}

function renderDrugs(){
  document.getElementById("drugList").innerHTML = drugs.map(d=>`
    <div class="row">
      <div class="rowIcon ${d[3]}">${svg(d[4])}</div>
      <div class="rowMain">
        <h3>${d[0]}</h3>
        <p>${d[1]}</p>
      </div>
      <span class="badge ${d[2]==="SKUBUS" ? "crit" : "urgent"}">${d[2]}</span>
    </div>
  `).join("");
}

function renderProtocols(){
  document.getElementById("protoList").innerHTML = data.map((x,i)=>`
    <div class="row" onclick="openD(${i})">
      <div class="rowIcon ${x.c}">${svg(x.icon)}</div>
      <div class="rowMain"><h3>${x.t}</h3></div>
      <span>›</span>
    </div>
  `).join("");
}
